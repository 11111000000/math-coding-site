[book]
title = "math-coding"
description = "A convention for mathematically grounded software artifacts"
authors = ["math-coding"]
language = "en"
multilingual = false
src = "src"

[build]
build-dir = "book"
create-missing = true

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/11111000000/math-coding"
edit-url-template = "https://github.com/11111000000/math-coding/edit/main/{path}"
site-url = "/math-coding/"
no-section-label = false
mathjax-support = true
copy-fonts = true
additional-css = ["theme/custom.css"]

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
title-split-level = 3